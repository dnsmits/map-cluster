services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      - api
    ports:
      - "3000:80"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://mapcluster:mapcluster@postgres:5432/mapcluster?sslmode=disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      CACHE_TTL: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: mapcluster
      POSTGRES_USER: mapcluster
      POSTGRES_PASSWORD: mapcluster
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mapcluster -d mapcluster"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
